name: garden_town_county
description: Garden Town County Assembly — offline-first member database with Firebase sync.
publish_to: "none"
version: 1.3.0+25

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (SQLite)
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  path: ^1.9.1
  path_provider: ^2.1.5

  # Firebase (cloud sync + auth + file storage)
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.3
  firebase_storage: ^12.4.5

  # File pick / open external apps
  file_picker: ^8.3.7
  url_launcher: ^6.3.1
  open_filex: ^4.7.0

  # Activities GPS + formatting
  geolocator: ^14.0.0
  intl: ^0.20.2
  uuid: ^4.5.1
  crypto: ^3.0.6
  pointycastle: ^3.9.1
  archive: ^4.0.7
  connectivity_plus: ^6.1.4
  collection: ^1.19.1
  shared_preferences: ^2.5.3
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  share_plus: ^12.0.2
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/county_logo.png
    - assets/images/county_logo_alt.png
