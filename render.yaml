# Deploy Flutter web as a static site on Render.
# Uses a release tarball (faster than git clone of the full Flutter repo).
services:
  - type: web
    name: garden-town-county
    runtime: static
    buildCommand: |
      set -e
      FLUTTER_VERSION=3.44.6
      ARCHIVE=flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
      curl -fsSL -o /tmp/$ARCHIVE \
        "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/$ARCHIVE"
      tar -xJf /tmp/$ARCHIVE -C $HOME
      export PATH="$HOME/flutter/bin:$PATH"
      flutter config --no-analytics --enable-web
      flutter pub get
      flutter build web --release --pwa-strategy=none
    staticPublishPath: build/web
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
