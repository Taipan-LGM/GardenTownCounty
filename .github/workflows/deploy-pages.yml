name: Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Pin Flutter version + cache SDK/pub for faster deploys.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.6"
          cache: true

      - name: Build web
        run: |
          flutter config --no-analytics --enable-web
          flutter pub get
          flutter build web --release --base-href "/GardenTownCounty/" --pwa-strategy=none

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
