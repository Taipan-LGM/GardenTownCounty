<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Garden Town County Assembly">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="garden_town_county">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Garden Town County</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Build stamp — CI replaces __APP_BUILD__ after flutter build.
    // Change forces browsers to fetch a new flutter_bootstrap.js URL.
    var GTC_BUILD = '__APP_BUILD__';
    if (GTC_BUILD.indexOf('__') === 0) {
      GTC_BUILD = '1.2.11';
    }

    // Clear stale Flutter / PWA caches so GitHub Pages deploys show up.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if (window.caches) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      });
    }

    var s = document.createElement('script');
    s.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(GTC_BUILD);
    s.async = true;
    document.body.appendChild(s);
  </script>
</body>
</html>
